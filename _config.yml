title: Sweet Home
description: >- # this means to ignore newlines until "baseurl:"
  Just a personal site for some technical notes. Theme from Flexible-Jekyll.
permalink: ':title/'
baseurl: "" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site, e.g. http://example.com

# Author Settings
author: Julian Freeman # add your name
author-img: author-img.png # add your photo
about-author: I am a nobody from earth. # add description
social-github: JulianFreeman # add your Github handle
social-email: freemanjulian372@gmail.com # add your Email address

# Build Settings
markdown: kramdown
plugins:
  - jekyll-sitemap
  - jekyll-paginate
  - jemoji

paginate: 8
paginate_path: "/page/:num"

exclude: ["node_modules", "gulpfile.js", "package.json", "yarn.lock"]
